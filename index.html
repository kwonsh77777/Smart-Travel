<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스마트여행이력</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  
  <style>
    /* 여백을 완전히 없애고 스크롤 바를 숨겨 진짜 스마트폰 앱 UI 환경 구축 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    
    /* 구글 배너를 차단하고 주소 입력창 흔적을 숨기는 전체 화면 프레임 */
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

  <iframe src="YOUR_GAS_WEBAPP_URL_HERE" allow="geolocation; microphone; camera;"></iframe>

</body>
</html>
